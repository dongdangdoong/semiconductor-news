<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>지난 뉴스 - 반도체 뉴스 클리핑</title>
  <style>
    body {
      margin: 0;
      background: #f6f7f9;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 18px 48px;
    }

    .header {
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: -0.04em;
    }

    .back-link {
      display: inline-block;
      margin-top: 10px;
      color: #2563eb;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .date-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .date-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px 20px;
      text-decoration: none;
      color: #111827;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    .date-card:hover {
      border-color: #2563eb;
    }

    .date-label {
      font-weight: 700;
      font-size: 16px;
    }

    .date-count {
      color: #6b7280;
      font-size: 14px;
    }

    .empty {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 24px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="header">
      <h1>지난 뉴스</h1>
      <a class="back-link" href="/">← 오늘 뉴스로</a>
    </header>

    {% if dates %}
      <div class="date-list">
        {% for entry in dates %}
          <a class="date-card" href="/archive/{{ entry.date }}">
            <span class="date-label">{{ entry.date }}</span>
            <span class="date-count">기사 {{ entry.count }}건</span>
          </a>
        {% endfor %}
      </div>
    {% else %}
      <div class="empty">아직 보관된 지난 뉴스가 없습니다.</div>
    {% endif %}
  </main>
</body>
</html>
