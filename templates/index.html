<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>반도체 뉴스 클리핑</title>
    <style>
        body {
            font-family: Arial, "Noto Sans KR", sans-serif;
            max-width: 760px;
            margin: 36px auto;
            line-height: 1.55;
            color: #111;
            background: #fff;
            font-size: 15px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        h1 {
            font-size: 24px;
            margin: 0;
            font-weight: 700;
        }

        .refresh-btn {
            background: #111;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .updated {
            font-size: 12px;
            color: #777;
            margin-bottom: 26px;
        }

        .news-card {
            margin-bottom: 30px;
        }

        .title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.45;
        }

        .title a {
            color: #111;
            text-decoration: none;
        }

        .title a:hover {
            text-decoration: underline;
        }

        .time {
            font-size: 12px;
            color: #888;
            font-weight: 400;
            margin-left: 6px;
        }

        .summary {
            font-size: 15px;
            color: #111;
            line-height: 1.55;
            margin-bottom: 12px;
            white-space: pre-line;
        }

        .article-link {
            font-size: 14px;
            margin-top: 6px;
        }

        .article-link a {
            color: #1a73e8;
            text-decoration: none;
        }

        .article-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>반도체 뉴스 클리핑</h1>
        <button class="refresh-btn" onclick="location.reload()">새로고침</button>
    </div>

    <div class="updated">
        마지막 화면 갱신: {{ updated_at }}
    </div>

    {% for news in news_list %}
    <div class="news-card">
        <div class="title">
            - <a href="{{ news.link }}" target="_blank">{{ news.title }}</a>
            <span class="time">{{ news.published_ago }}</span>
        </div>

        <div class="summary">{{ news.summary }}</div>

        <div class="article-link">
            <a href="{{ news.link }}" target="_blank">{{ news.short_link }}</a>
        </div>
    </div>
    {% endfor %}

</body>
</html>
