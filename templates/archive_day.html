<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ date }} 반도체 뉴스 - 반도체 뉴스 클리핑</title>
  <style>
    body {
      margin: 0;
      background: #f6f7f9;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 18px 48px;
    }

    .header {
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      letter-spacing: -0.04em;
    }

    .nav-links {
      display: flex;
      gap: 14px;
      margin-top: 10px;
    }

    .nav-links a {
      color: #2563eb;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }

    .nav-links a:hover {
      text-decoration: underline;
    }

    .news-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    .title-line {
      display: flex;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .bullet {
      flex: 0 0 auto;
      font-weight: 800;
    }

    .title {
      color: #111827;
      text-decoration: none;
      font-weight: 800;
      font-size: 17px;
      letter-spacing: -0.03em;
    }

    .title:hover {
      text-decoration: underline;
    }

    .published-time {
      white-space: nowrap;
      color: #6b7280;
      font-size: 13px;
      font-weight: 500;
      margin-left: 6px;
    }

    .summary {
      margin: 0 0 10px 18px;
      color: #374151;
      font-size: 15px;
    }

    .short-link {
      margin-left: 18px;
      color: #2563eb;
      font-size: 14px;
      text-decoration: none;
      word-break: break-all;
    }

    .short-link:hover {
      text-decoration: underline;
    }

    .empty {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 24px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="header">
      <h1>{{ date }} 반도체 뉴스</h1>
      <div class="nav-links">
        <a href="/">오늘 뉴스</a>
        <a href="/archive">지난 뉴스 목록</a>
      </div>
    </header>

    {% if news_list %}
      {% for item in news_list %}
        <article class="news-card">
          <div class="title-line">
            <span class="bullet">-</span>
            <a class="title" href="{{ item.link }}" target="_blank" rel="noopener noreferrer">
              {{ item.title }}
            </a>
            <span class="published-time">{{ item.published_time_label }}</span>
          </div>

          <p class="summary">{{ item.summary }}</p>

          <a class="short-link" href="{{ item.link }}" target="_blank" rel="noopener noreferrer">
            {{ item.short_link }}
          </a>
        </article>
      {% endfor %}
    {% else %}
      <div class="empty">이 날짜에 저장된 기사가 없습니다.</div>
    {% endif %}
  </main>
</body>
</html>
