<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>반도체 뉴스 클리핑</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 980px;
            margin: 40px auto;
            line-height: 1.6;
            color: #222;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 28px;
            margin: 0;
        }

        .refresh-btn {
            background: #111;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .updated {
            font-size: 13px;
            color: #777;
            margin-bottom: 20px;
        }

        .news-card {
            border-bottom: 1px solid #ddd;
            padding: 18px 0;
        }

        .keyword {
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .title a {
            color: #111;
            text-decoration: none;
        }

        .title a:hover {
            text-decoration: underline;
        }

        .time {
            font-size: 14px;
            color: #888;
            font-weight: normal;
            margin-left: 8px;
        }

        .summary {
            font-size: 15px;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>반도체 뉴스 클리핑</h1>
        <button class="refresh-btn" onclick="location.reload()">새로고침</button>
    </div>

    <div class="updated">
        마지막 업데이트: {{ updated_at }}
    </div>

    {% for news in news_list %}
    <div class="news-card">
        <div class="keyword"># {{ news.keyword }}</div>

        <div class="title">
            <a href="{{ news.link }}" target="_blank">
                {{ news.title }}
            </a>
            <span class="time">{{ news.published_ago }}</span>
        </div>

        <div class="summary">
            {{ news.summary }}
        </div>
    </div>
    {% endfor %}

</body>
</html>
