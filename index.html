<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반도체 뉴스 브리핑</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #0d0f14;
  --bg2:    #13161e;
  --bg3:    #1a1e28;
  --line:   #232736;
  --line2:  #2e3347;
  --txt:    #e8eaf0;
  --txt2:   #8b90a0;
  --txt3:   #555a6e;
  --accent: #4f8ef7;
  --accent2:#1d3a6e;
  --green:  #34c77b;
  --amber:  #f5a623;
  --purple: #a07bf8;
  --purple-bg:#1a1230;
  --radius: 10px;
  --mono:   'JetBrains Mono','Fira Mono','Consolas',monospace;
}
body {
  background: var(--bg);
  color: var(--txt);
  font-family: 'Pretendard','Apple SD Gothic Neo','Noto Sans KR',-apple-system,sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}
.wrap { max-width: 860px; margin: 0 auto; padding: 0 24px; }

/* 헤더 */
header {
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0; gap: 16px;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 32px; height: 32px;
  background: var(--accent2); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.logo-icon svg { width: 18px; height: 18px; }
.logo-text { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
.logo-text span { color: var(--accent); }
.header-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--txt3); }
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); display: inline-block;
  box-shadow: 0 0 6px var(--green);
  animation: glow 2s ease-in-out infinite;
}
@keyframes glow { 0%,100%{opacity:1} 50%{opacity:.4} }
.refresh-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 6px;
  border: 1px solid var(--line2); background: transparent;
  color: var(--txt2); font-size: 12px; cursor: pointer; transition: all .15s;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

/* 필터 */
.filter-bar {
  display: flex; gap: 6px; flex-wrap: wrap;
  padding: 16px 0 12px; align-items: center;
}
.filter-label { font-size: 11px; color: var(--txt3); margin-right: 2px; }
.filter-chip {
  font-size: 12px; padding: 4px 12px; border-radius: 20px;
  border: 1px solid var(--line2); background: transparent;
  color: var(--txt2); cursor: pointer; transition: all .15s; white-space: nowrap;
}
.filter-chip:hover  { border-color: var(--accent); color: var(--accent); }
.filter-chip.active { background: var(--accent2); border-color: var(--accent); color: var(--accent); }

/* 날짜 & 건수 */
.date-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0 14px;
  font-size: 12px; color: var(--txt3);
  border-bottom: 1px solid var(--line);
  margin-bottom: 16px;
}
.date-bar strong { color: var(--txt2); }

/* 뉴스 카드 */
.news-list { display: flex; flex-direction: column; gap: 2px; }
.news-card {
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  padding: 18px 0;
  text-decoration: none;
  display: block;
  transition: background .15s;
}
.news-card:hover { background: var(--bg3); border-radius: var(--radius); padding: 18px 14px; margin: 0 -14px; }
.news-card-top { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px; }
.impact-badge {
  flex-shrink: 0; width: 24px; height: 24px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; margin-top: 1px;
}
.imp5 { background: #1d2f5a; color: var(--accent); }
.imp4 { background: #1a2e25; color: var(--green); }
.imp3 { background: #2d2500; color: var(--amber); }
.imp2 { background: var(--bg3); color: var(--txt2); }
.imp1 { background: var(--bg3); color: var(--txt3); }
.news-title {
  font-size: 14px; font-weight: 600;
  color: var(--txt); line-height: 1.45; flex: 1;
}
.news-tags {
  display: flex; gap: 5px; flex-wrap: wrap;
  margin: 6px 0 8px 34px;
}
.tag {
  font-size: 10px; font-weight: 600; letter-spacing: .04em;
  padding: 2px 8px; border-radius: 20px; border: 1px solid;
}
.tag-company { background: var(--bg3); border-color: var(--line2); color: var(--txt2); }
.tag-topic   { background: var(--purple-bg); border-color: #3a2a5a; color: var(--purple); }
.news-summary {
  font-size: 13px; color: var(--txt2); line-height: 1.7;
  margin-left: 34px; margin-bottom: 8px;
}
.news-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-left: 34px;
}
.news-time { font-size: 11px; color: var(--txt3); font-family: var(--mono); }
.news-source { font-size: 11px; color: var(--txt3); }
.news-link {
  font-size: 11px; color: var(--accent); opacity: .6;
  display: flex; align-items: center; gap: 3px; transition: opacity .15s;
}
.news-card:hover .news-link { opacity: 1; }

/* 로딩 / 빈 상태 */
.loading {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 0; gap: 16px; color: var(--txt3);
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--line2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 60px 0; color: var(--txt3); font-size: 14px; }

/* 푸터 */
footer {
  border-top: 1px solid var(--line); padding: 20px 0; margin-top: 48px;
  font-size: 11px; color: var(--txt3);
  display: flex; align-items: center; justify-content: space-between;
}

@media (max-width: 600px) {
  .header-meta .generated { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#4f8ef7" stroke-width="1.8">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
            <rect x="9" y="9" width="6" height="6" rx="1"/>
            <line x1="4" y1="9" x2="2" y2="9"/><line x1="4" y1="12" x2="2" y2="12"/>
            <line x1="4" y1="15" x2="2" y2="15"/><line x1="20" y1="9" x2="22" y2="9"/>
            <line x1="20" y1="12" x2="22" y2="12"/><line x1="20" y1="15" x2="22" y2="15"/>
            <line x1="9" y1="4" x2="9" y2="2"/><line x1="12" y1="4" x2="12" y2="2"/>
            <line x1="15" y1="4" x2="15" y2="2"/><line x1="9" y1="20" x2="9" y2="22"/>
            <line x1="12" y1="20" x2="12" y2="22"/><line x1="15" y1="20" x2="15" y2="22"/>
          </svg>
        </div>
        <div class="logo-text"><span>반도체</span> 뉴스 브리핑</div>
      </div>
      <div class="header-meta">
        <span class="generated" id="genTime">로딩 중...</span>
        <span class="status-dot"></span>
        <button class="refresh-btn" onclick="loadNews()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"/>
          </svg>
          새로고침
        </button>
      </div>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="filter-bar" id="filterBar" style="display:none">
    <span class="filter-label">필터</span>
    <button class="filter-chip active" data-t="all"      onclick="filter(this)">전체</button>
    <button class="filter-chip"        data-t="파운드리"   onclick="filter(this)">파운드리</button>
    <button class="filter-chip"        data-t="메모리"     onclick="filter(this)">메모리</button>
    <button class="filter-chip"        data-t="AI칩"       onclick="filter(this)">AI 칩</button>
    <button class="filter-chip"        data-t="장비소재"   onclick="filter(this)">장비·소재</button>
    <button class="filter-chip"        data-t="정책규제"   onclick="filter(this)">정책·규제</button>
    <button class="filter-chip"        data-t="투자MA"     onclick="filter(this)">투자·M&A</button>
    <button class="filter-chip"        data-t="공급망"     onclick="filter(this)">공급망</button>
  </div>

  <div class="date-bar" id="dateBar" style="display:none">
    <span id="dateLabel"></span>
    <span><strong id="countLabel"></strong> 건</span>
  </div>

  <div id="newsList">
    <div class="loading"><div class="spinner"></div><span>뉴스 로딩 중...</span></div>
  </div>
</main>

<footer class="wrap">
  <span>반도체 뉴스 브리핑 — AI Powered by Gemini</span>
  <span id="footerTime"></span>
</footer>

<script>
let allStories = [];
let currentTopic = 'all';

async function loadNews() {
  document.getElementById('newsList').innerHTML =
    '<div class="loading"><div class="spinner"></div><span>뉴스 로딩 중...</span></div>';
  document.getElementById('filterBar').style.display = 'none';
  document.getElementById('dateBar').style.display   = 'none';

  try {
    const res  = await fetch('/data/news.json');
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    render(data);
  } catch(e) {
    document.getElementById('newsList').innerHTML =
      `<div class="empty">데이터를 불러올 수 없습니다.<br>
       <small style="color:var(--txt3)">${e.message}</small></div>`;
  }
}

function render(data) {
  allStories = data.stories || [];

  const dt  = new Date(data.generated_at);
  const fmt = dt.toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('genTime').textContent    = `${fmt} 업데이트`;
  document.getElementById('footerTime').textContent = `최근 24시간 기준`;
  document.getElementById('dateLabel').textContent  = data.date || '';

  document.getElementById('filterBar').style.display = 'flex';
  document.getElementById('dateBar').style.display   = 'flex';

  renderCards();
}

function renderCards() {
  const stories = currentTopic === 'all'
    ? allStories
    : allStories.filter(s => s.topic === currentTopic);

  document.getElementById('countLabel').textContent = stories.length;

  if (!stories.length) {
    document.getElementById('newsList').innerHTML =
      '<div class="empty">해당 토픽의 기사가 없습니다.</div>';
    return;
  }

  document.getElementById('newsList').innerHTML = '<div class="news-list">' +
    stories.map(s => {
      const imp    = Math.min(5, Math.max(1, s.impact || 3));
      const impLbl = imp >= 5 ? 'H5' : imp >= 4 ? 'H4' : imp >= 3 ? 'H3' : imp >= 2 ? 'L2' : 'L1';
      return `
      <a class="news-card" href="${esc(s.url)}" target="_blank" rel="noopener noreferrer">
        <div class="news-card-top">
          <div class="impact-badge imp${imp}">${impLbl}</div>
          <div class="news-title">${esc(s.title_ko || s.title || '')}</div>
        </div>
        <div class="news-tags">
          ${s.company ? `<span class="tag tag-company">${esc(s.company)}</span>` : ''}
          ${s.topic   ? `<span class="tag tag-topic">${esc(s.topic)}</span>`   : ''}
        </div>
        ${s.summary_ko ? `<div class="news-summary">${esc(s.summary_ko)}</div>` : ''}
        <div class="news-footer">
          <span class="news-time">${esc(s.published||'')} · ${esc(s.source||'')}</span>
          <span class="news-link">
            원문
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
          </span>
        </div>
      </a>`;
    }).join('') + '</div>';
}

function filter(el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentTopic = el.dataset.t;
  renderCards();
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

loadNews();
</script>
</body>
</html>
