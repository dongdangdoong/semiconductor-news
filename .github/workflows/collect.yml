name: Update Semiconductor News

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: semiconductor-news-update
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 기존 패키지 설치 및 뉴스 생성 단계 유지

      - name: Commit updated news
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"

          git add data/news.json data/archive

          if git diff --cached --quiet; then
            echo "변경된 뉴스가 없습니다."
            exit 0
          fi

          git commit -m "Update semiconductor news"
          git pull --rebase origin main
          git push origin main
