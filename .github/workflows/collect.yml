name: 반도체 뉴스 매일 수집

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install feedparser

      - name: 뉴스 수집 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python agent.py

      - name: 결과 저장
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/news.json
          git diff --staged --quiet || git commit -m "뉴스 업데이트 $(date +'%Y-%m-%d')"
          git push
